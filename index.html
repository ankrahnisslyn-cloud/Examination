<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Mansion with Garage and Pool</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('realistic-water', {
        schema: {
          color: {type: 'color', default: '#3dc9d1'},
          opacity: {type: 'number', default: 0.7},
          rippleSpeed: {type: 'number', default: 1.2},
          rippleStrength: {type: 'number', default: 0.04}
        },
        init: function () {
          const geometry = new THREE.PlaneGeometry(10, 10, 128, 128);
          const material = new THREE.MeshStandardMaterial({
            color: this.data.color,
            transparent: true,
            opacity: this.data.opacity,
            roughness: 0.1,
            metalness: 0.2,
            side: THREE.DoubleSide,
            flatShading: false
          });
          this.mesh = new THREE.Mesh(geometry, material);
          this.mesh.rotation.x = -Math.PI / 2;
          this.el.setObject3D('mesh', this.mesh);
          this.originalPositions = geometry.attributes.position.array.slice();
        },
        tick: function (time, timeDelta) {
          if (!this.mesh) return;
          const positions = this.mesh.geometry.attributes.position.array;
          const t = time / 1000;
          const { rippleSpeed, rippleStrength } = this.data;
          for (let i = 0; i < positions.length; i += 3) {
            const x = this.originalPositions[i];
            const y = this.originalPositions[i + 1];
            const swell = Math.sin(x * 0.5 + t * rippleSpeed * 0.5) * rippleStrength * 1.5;
            const ripple = Math.cos(y * 2.0 - t * rippleSpeed) * rippleStrength * 0.8;
            const micro = Math.sin((x + y) * 4.0 + t * 2.0) * (rippleStrength * 0.3);
            positions[i + 2] = swell + ripple + micro;
          }
          this.mesh.geometry.attributes.position.needsUpdate = true;
          this.mesh.geometry.computeVertexNormals();
        }
      });
    </script>
</head>
<body>
    <a-scene renderer="colorManagement: true; antialias: true;">

      <!-- Ground -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#228B22"></a-plane>

      <!-- Sky -->
      <a-sky color="#87CEEB"></a-sky>

      <!-- Camera + Controls -->
      <a-entity position="-5 1.6 25">
        <a-camera look-controls wasd-controls></a-camera>
      </a-entity>

      <!-- Lighting -->
      <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1" position="-1 2 1" cast-shadow="true"></a-light>
      <a-light type="hemisphere" color="#ffffff" groundColor="#444444" intensity="0.4"></a-light>

      <!-- Luxury Mansion (1) Model - Brown Color -->
      <a-entity id="mansion" position="-16.7 0.10 -6.8" scale="1 1 1" shadow="cast: true; receive: true"
          gltf-model="./Model/luxury_mansion (1).glb">
      </a-entity>

      <!-- Garage Structure (Right Side of Mansion) - 3 Bay Garage -->
      <a-entity id="garage" position="15.78 0 -3.15">

        <!-- Garage Floor -->
        <a-box position="0 0.05 0" width="12" height="0.1" depth="10"
            material="color: #4a4a4a; roughness: 0.8" shadow="receive: true"></a-box>

        <!-- Back Wall -->
        <a-box position="0 3 -5" width="12" height="6" depth="0.3"
            material="color: #8B4513; roughness: 0.7" shadow="cast: true"></a-box>

        <!-- Left Wall -->
        <a-box position="-6 3 0" width="0.3" height="6" depth="10"
            material="color: #8B4513; roughness: 0.7" shadow="cast: true"></a-box>

        <!-- Right Wall -->
        <a-box position="6 3 0" width="0.3" height="6" depth="10"
            material="color: #8B4513; roughness: 0.7" shadow="cast: true"></a-box>

        <!-- Front Wall Sections -->
        <a-box position="-4.5 3 5" width="3" height="6" depth="0.3"
            material="color: #8B4513; roughness: 0.7" shadow="cast: true"></a-box>
        <a-box position="4.5 3 5" width="3" height="6" depth="0.3"
            material="color: #8B4513; roughness: 0.7" shadow="cast: true"></a-box>
        <a-box position="0 5.25 5" width="9" height="1.5" depth="0.3"
            material="color: #8B4513; roughness: 0.7" shadow="cast: true"></a-box>

        <!-- Roof -->
        <a-box position="0 6.1 0.11" width="12.6" height="0.2" depth="10.6"
            material="color: #3d2817; roughness: 0.6" shadow="cast: true"></a-box>

        <!-- Garage Doors (3 bays) -->
        <a-box position="-3 2.5 5" width="3.5" height="5" depth="0.2"
            material="color: #654321; roughness: 0.5; metalness: 0.3" shadow="cast: true">
            <a-animation attribute="position" from="-3 2.5 5" to="-3 5 5" dur="4000" repeat="indefinite"
                direction="alternate" easing="easeInOutSine"></a-animation>
        </a-box>
        <a-box position="0 2.5 5" width="3.5" height="5" depth="0.2"
            material="color: #5a3a1a; roughness: 0.5; metalness: 0.3" shadow="cast: true">
            <a-animation attribute="position" from="0 2.5 5" to="0 5 5" dur="4000" repeat="indefinite"
                direction="alternate" easing="easeInOutSine" delay="1000"></a-animation>
        </a-box>
        <a-box position="3 2.5 5" width="3.5" height="5" depth="0.2"
            material="color: #654321; roughness: 0.5; metalness: 0.3" shadow="cast: true">
            <a-animation attribute="position" from="3 2.5 5" to="3 5 5" dur="4000" repeat="indefinite"
                direction="alternate" easing="easeInOutSine" delay="2000"></a-animation>
        </a-box>

        <!-- Door Windows -->
        <a-box position="-3 4 5.15" width="1" height="0.8" depth="0.1"
            material="color: #87CEEB; transparent: true; opacity: 0.6"></a-box>
        <a-box position="0 4 5.15" width="1" height="0.8" depth="0.1"
            material="color: #87CEEB; transparent: true; opacity: 0.6"></a-box>
        <a-box position="3 4 5.15" width="1" height="0.8" depth="0.1"
            material="color: #87CEEB; transparent: true; opacity: 0.6"></a-box>

        <!-- Interior Lights -->
        <a-light type="point" color="#FFF8DC" intensity="1" distance="20" position="0 5.5 0" cast-shadow="true"></a-light>
        <a-light type="point" color="#FFF8DC" intensity="0.8" distance="15" position="-4 5.5 0"></a-light>
        <a-light type="point" color="#FFF8DC" intensity="0.8" distance="15" position="4 5.5 0"></a-light>

        <!-- Decorative Pillars -->
        <a-entity position="-6.2 0 5.3">
            <a-box width="0.7" height="5.5" depth="0.7" position="0 2.75 0"
                material="color: #654321; roughness: 0.6" shadow="cast: true"></a-box>
            <a-sphere radius="0.4" position="0 5.7 0"
                material="color: #FFD700; metalness: 0.8; roughness: 0.2"></a-sphere>
            <a-light type="point" color="#FFD700" intensity="0.6" distance="6" position="0 5.5 0"></a-light>
        </a-entity>
        <a-entity position="6.2 0 5.3">
            <a-box width="0.7" height="5.5" depth="0.7" position="0 2.75 0"
                material="color: #654321; roughness: 0.6" shadow="cast: true"></a-box>
            <a-sphere radius="0.4" position="0 5.7 0"
                material="color: #FFD700; metalness: 0.8; roughness: 0.2"></a-sphere>
            <a-light type="point" color="#FFD700" intensity="0.6" distance="6" position="0 5.5 0"></a-light>
        </a-entity>

        <!-- Driveway -->
        <a-box position="0 0.02 10" width="10" height="0.04" depth="12"
            material="color: #5a5a5a; roughness: 0.7"></a-box>

        <!-- Driveway Lines -->
        <a-box position="-2.5 0.03 10" width="0.2" height="0.01" depth="10"
            material="color: #ffffff; roughness: 0.8"></a-box>
        <a-box position="0 0.03 10" width="0.2" height="0.01" depth="10"
            material="color: #ffffff; roughness: 0.8"></a-box>
        <a-box position="2.5 0.03 10" width="0.2" height="0.01" depth="10"
            material="color: #ffffff; roughness: 0.8"></a-box>

      </a-entity>

      <!-- Lamborghini Venevo - Parked in Front of Garage -->
      <a-entity id="lamborghini" position="16.43 -0.01 7.42" scale="0.5 0.5 0.5" rotation="0 -14.7 0"
          shadow="cast: true; receive: true" gltf-model="./Model/lamborghini_venevo.glb">
      </a-entity>

      <!-- Realistic Sunken Hollow Pool -->
      <a-entity id="pool-structure"
                position="-13.25 0.39 -5.13" 
                scale="0.512 1 0.603"
                rotation="0 -3.28 0">
        
        <!-- THE WATER (Inside the hollow) -->
        <a-entity 
          id="realistic-pool-water"
          realistic-water="color: #2fb5bd; rippleStrength: 0.05; opacity: 0.75"
          position="0 -0.2 0"
          scale="1 1 1">
        </a-entity>

        <!-- THE HOLLOW BASIN -->
        <!-- Deep floor color to give volume -->
        <a-box position="0 -2.5 0" width="10" height="0.1" depth="10" color="#001a2b"></a-box>
        
        <!-- Inner Walls -->
        <a-box position="-5 -1.25 0" width="0.1" height="2.5" depth="10" color="#002b4d"></a-box>
        <a-box position="5 -1.25 0" width="0.1" height="2.5" depth="10" color="#002b4d"></a-box>
        <a-box position="0 -1.25 5" width="10" height="2.5" depth="0.1" color="#002b4d"></a-box>
        <a-box position="0 -1.25 -5" width="10" height="2.5" depth="0.1" color="#002b4d"></a-box>
        
        <!-- THE LIP (The frame) -->
        <a-box position="0 0 5.25" width="11" height="0.1" depth="0.5" color="#ffffff"></a-box>
        <a-box position="0 0 -5.25" width="11" height="0.1" depth="0.5" color="#ffffff"></a-box>
        <a-box position="-5.25 0 0" width="0.5" height="0.1" depth="11" color="#ffffff"></a-box>
        <a-box position="5.25 0 0" width="0.5" height="0.1" depth="11" color="#ffffff"></a-box>
      </a-entity>

    </a-scene>

    <script>
      // Change mansion color to brown after loading
      document.getElementById('mansion').addEventListener('model-loaded', function(e) {
        const model = e.detail.model;
        const brownColor = new THREE.Color(0x8B4513); // SaddleBrown

        model.object3D.traverse(function(child) {
          if (child.isMesh && child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach(function(mat) {
                if (mat.color) mat.color.copy(brownColor);
                mat.emissive = new THREE.Color(0x3d1f0a);
              });
            } else {
              if (child.material.color) child.material.color.copy(brownColor);
              child.material.emissive = new THREE.Color(0x3d1f0a);
            }
          }
        });

        console.log('Mansion color changed to brown');
      });
    </script>
</body>
</html>
